<div class="wrapper">
    <div class="logo">
        <img src="../../assets/images/icons8-merchant-account-50.png" alt="">
    </div>
    <div class="text-center mt-4 name">
        My Bank
        <h6>{{aim}}</h6>
         <!-- string interpolation -->
    </div>
    <form class="p-3 mt-3">
        <div class="form-field d-flex align-items-center">
            <input [(ngModel)]="acno" type="text" name="userName" id="login_acno" [placeholder]="account">
        </div>
        <div class="form-field d-flex align-items-center">
            <input [(ngModel)]="pswd" type="password" name="password" id="login_pswd" placeholder="Password">
        </div>
        <button class="btn mt-3" (click)="login()" type="button">Login</button>
    </form>
    <div class="text-center fs-6">
        <a href="#">Forget password?</a> or <a routerLink="register">Sign up</a>
    </div>
</div>
